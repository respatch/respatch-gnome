app-id: sk.tito10047.respatch
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: respatch
finish-args:
    - --share=network
    - --share=ipc
    - --socket=fallback-x11
    - --socket=wayland
    - --device=dri
    - --talk-name=org.freedesktop.Notifications
modules:
  # 1. Blueprint Compiler
  - name: blueprint-compiler
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/jwestman/blueprint-compiler.git
        tag: v0.14.0 # Alebo verzia, ktorú preferuješ

  # 2. Node.js (potrebný pre esbuild)
  # Poznámka: Pre jednoduchosť skúsime použiť SDK verziu esbuild,
  # ak by to zlyhalo, budeme musieť esbuild riešiť ako extra krok.
  - name: esbuild
    buildsystem: simple
    sources:
        - type: file
          url: https://github.com/evanw/esbuild/releases/download/v0.28.0/esbuild-linux-64.tgz
            # Ak ti vypíše chybu SHA256, skopíruj ten správny hash z chybovej hlášky sem:
          sha256: 01f19d2737504381534015f62e8419614457e5102008e3532454536768787f73
    build-commands:
        - tar -xf esbuild-linux-64.tgz
        - install -D esbuild /app/bin/esbuild
  # 3. Samotná aplikácia
  - name: respatch
    buildsystem: meson
    sources:
        - type: git
          url: https://github.com/respatch/respatch-gnome
          branch: main